# Supabase CLI — https://supabase.com/docs/guides/cli/config
# After `supabase link`, project_id is filled automatically.

project_id = "barber-Ennglish"

[api]
enabled = true

# Cron calls must send Authorization: Bearer <service_role_jwt> (pg_cron SQL below).
[functions.send-monthly-report]
verify_jwt = true

# Login/register SMS OTP — called before user session exists
[functions.auth-phone-otp]
verify_jwt = false

# Pulseem DB field encryption — Bearer must be service role (super-admin app only)
[functions.pulseem-admin-credentials]
verify_jwt = false
