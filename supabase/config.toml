# Supabase CLI — https://supabase.com/docs/guides/cli/config
# After `supabase link`, project_id is filled automatically.

project_id = "barber-Ennglish"

[api]
enabled = true

# Cron calls must send Authorization: Bearer <service_role_jwt> (pg_cron SQL below).
[functions.send-monthly-report]
verify_jwt = true

[functions.appointment-reminders]
verify_jwt = true

# Cron: daily ~12:00 Asia/Jerusalem — birthday in-app notifications (+ push/SMS via notifications trigger)
# verify_jwt false: auth is checked in code (vault/pg_net often sends apikey; avoids gateway 401 mismatches).
[functions.birthday-notifications]
verify_jwt = false

# Login/register SMS OTP — called before user session exists
[functions.auth-phone-otp]
verify_jwt = false

# Pulseem DB field encryption — Bearer must be service role (super-admin app only)
[functions.pulseem-admin-credentials]
verify_jwt = false

# Pulseem: create sub-account + encrypted credentials for existing business (service role Bearer)
[functions.pulseem-provision-subaccount]
verify_jwt = false

# Pulseem: CreditTransfer from main account to existing Direct API key on business_profile
[functions.pulseem-credit-transfer]
verify_jwt = false

# Green Invoice (חשבונית ירוקה): app uses custom auth (no Supabase Auth session). Auth in function: caller_user_id + business_id vs users table (service role).
[functions.greeninvoice-connect]
verify_jwt = false

# Database Webhook on notifications INSERT — Authorization: Bearer <SERVICE_ROLE_KEY>
[functions.notification-push-sms]
verify_jwt = true

# Landing / Lovable: POST with ONBOARDING_WEBHOOK_SECRET (not Supabase JWT)
[functions.onboarding-webhook]
verify_jwt = false
